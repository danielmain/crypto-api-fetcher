openapi: 3.0.3
info:
  title: Crypto API Fetcher
  version: 1.0.0
  description: |
    Minimal service that fetches the latest crypto prices from CoinGecko and
    serves them via cached REST endpoints.
servers:
  - url: http://localhost:3000
    description: Local development
tags:
  - name: Prices
  - name: Assets
paths:
  /api/price/{id}:
    get:
      tags:
        - Prices
      summary: Get latest USD price for a crypto asset
      description: |
        Returns the latest USD price for a single CoinGecko asset id.
        Responses are cached based on server configuration.
      parameters:
        - name: id
          in: path
          required: true
          description: Lowercase CoinGecko asset id (e.g., bitcoin, ethereum, cardano).
          schema:
            type: string
            pattern: "^[a-z0-9-]{1,64}$"
      responses:
        "200":
          description: Latest price for the requested asset id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PriceResponse"
              examples:
                bitcoin:
                  summary: Bitcoin price
                  value:
                    id: bitcoin
                    price: 43000.12
        "400":
          description: Invalid or missing asset id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "405":
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Upstream CoinGecko error or unparseable payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/assets:
    get:
      tags:
        - Assets
      summary: Get CoinGecko assets list
      description: |
        Returns the upstream CoinGecko `/coins/list` payload as-is.
        Responses are cached based on server configuration.
      responses:
        "200":
          description: Upstream assets list payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CryptoListResponse"
        "405":
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Upstream CoinGecko error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    PriceResponse:
      type: object
      additionalProperties: false
      required:
        - id
        - price
      properties:
        id:
          type: string
          description: CoinGecko id requested.
          example: bitcoin
        price:
          type: number
          description: Latest USD price.
          example: 43000.12
    CryptoListResponse:
      type: array
      description: CoinGecko `/coins/list` payload.
      items:
        $ref: "#/components/schemas/CryptoAsset"
      example:
        - id: bitcoin
          symbol: btc
          name: Bitcoin
          platforms: {}
        - id: ethereum
          symbol: eth
          name: Ethereum
          platforms:
            ethereum: "0xc02aaa39b223fe8d0a0e5c4f27ead9083c756cc2"
    CryptoAsset:
      type: object
      additionalProperties: false
      required:
        - id
        - symbol
        - name
      properties:
        id:
          type: string
          description: CoinGecko asset id.
          example: bitcoin
        symbol:
          type: string
          description: Asset ticker symbol.
          example: btc
        name:
          type: string
          description: Asset name.
          example: Bitcoin
        platforms:
          type: object
          additionalProperties:
            type: string
          description: Blockchain platforms and contract addresses.
          example:
            ethereum: "0x1234...abcd"
            polygon-pos: "0x5678...efgh"
    ErrorResponse:
      type: object
      additionalProperties: false
      required:
        - error
      properties:
        error:
          type: string
          description: Human-readable error message.
